name: Rz-Flow Publish

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  # Run every 3 hours
  schedule:
    - cron: "0 */3 * * *"

  # Allow manual trigger from GitHub UI (great for first run + debugging)
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (evaluate but don't publish to Telegram)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  # ── Publish (runs on cron and manual dispatch) ───────────────────────────
  publish:
    name: Publish to Telegram
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --no-dev --frozen

      - name: Initialize database
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          # Dummy values for non-DB settings (init-db doesn't use them)
          TELEGRAM_BOT_TOKEN: "dummy"
          TELEGRAM_CHANNEL_ID: "dummy"
          GEMINI_API_KEY: "dummy"
        run: uv run --no-dev rz-flow --init-db

      - name: Run pipeline
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: |
          DRY_RUN_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          uv run --no-dev rz-flow $DRY_RUN_FLAG

      - name: Save run summary
        if: always()
        run: |
          echo "## Rz-Flow Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Dry run**: ${{ github.event.inputs.dry_run || 'false' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Time**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
