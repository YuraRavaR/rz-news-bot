name: Rz-Flow Publish

on:
  # Run every 3 hours
  schedule:
    - cron: "0 */3 * * *"

  # Allow manual trigger from GitHub UI (great for first run + debugging)
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (evaluate but don't publish to Telegram)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

  # Also run tests on every push to main / PR
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Tests (runs on every push/PR) ─────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --dev

      - name: Ruff lint
        run: uv run ruff check src/ tests/

      - name: Ruff format check
        run: uv run ruff format --check src/ tests/

      - name: Run tests
        run: uv run pytest --cov=src/rz_flow --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        if: always()
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  # ── Job 2: Publish (runs on cron and manual dispatch) ────────────────────
  publish:
    name: Publish to Telegram
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Initialize database
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          # Dummy values for non-DB settings (init-db doesn't use them)
          TELEGRAM_BOT_TOKEN: "dummy"
          TELEGRAM_CHANNEL_ID: "dummy"
          GEMINI_API_KEY: "dummy"
        run: uv run rz-flow --init-db

      - name: Run pipeline
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: |
          DRY_RUN_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          uv run rz-flow $DRY_RUN_FLAG

      - name: Save run summary
        if: always()
        run: |
          echo "## Rz-Flow Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Dry run**: ${{ github.event.inputs.dry_run || 'false' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Time**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
